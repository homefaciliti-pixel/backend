name: userapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.4
  carousel_slider: ^5.1.2
  share_plus: ^12.0.1
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  shimmer: ^3.0.0
  geocoding: ^4.0.0
  razorpay_flutter: ^1.4.5
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/hfu.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# Ye block add karna zaroori tha splash screen ke liye
flutter_native_splash:

  color: "#DCE5F1"

  android: true
  ios: true

  fullscreen: true

  android_12:
    color: "#DCE5F1"
    icon_background_color: "#DCE5F1"